<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <title>My To-Do List</title>
  </head>
  <body>
    <div class="task-list container mt-4">
      <h1>Add Tasks!</h1>
      <hr />

      <form action="/" method="POST" id="task-form">
        <input
          class="form-control mb-2"
          id="task-input"
          type="text"
          name="content"
          placeholder="Add a new task..."
          required
        />
        <button class="btn btn-primary" type="submit" id="add-button">
          Add
        </button>
        <button
          class="btn btn-secondary"
          type="reset"
          formaction="/clear"
          id="clear-button"
        >
          Clear
        </button>
      </form>

      

      <div class="list-group">
        {% for task in tasks %}
        <div
          class="list-group-item d-flex justify-content-between align-items-center"
        >
          {{ task.content }}
          <div>
            <a href="/update/{{ task.id }}" class="btn btn-warning btn-sm"
              >Edit</a
            >
            <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm"
              >Delete</a
            >
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
