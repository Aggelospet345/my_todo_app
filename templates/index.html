<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <title>My To-Do List</title>
  </head>
  <body>
    <button
      class="btn btn-outline-primary mb-3"
      type="button"
      data-bs-toggle="offcanvas"
      data-bs-target="#sidebarMenu"
    >
      ☰ Menu
    </button>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">My Notepad</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="#">All Tasks</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Work</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Personal</a></li>
        </ul>
      </div>
    </div>

    <div class="task-list container mt-4">
      <h1 class="text-center mb-4 animated-title">Add Tasks!</h1>
      <hr />

      <form action="/" method="POST" id="task-form">
        <input
          class="form-control mb-2"
          id="task-input"
          type="text"
          name="content"
          placeholder="Add a new task..."
          required
        />

        <select name="priority" class="form-select mb-2">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>

        <button class="btn btn-primary" type="submit" id="add-button">
          Add
        </button>
        <button
          class="btn btn-secondary"
          type="reset"
          formaction="/clear"
          id="clear-button"
        >
          Clear
        </button>
      </form>
      {% for task in tasks %}
      <div
        class="list-group-item d-flex justify-content-between align-items-center"
      >
        <span>
          {{ task.content }}
          <span
            class="badge {% if task.priority == 'High' %}bg-danger {% elif task.priority == 'Medium' %}bg-warning {% else %}bg-success{% endif %}"
          >
            {{ task.priority }}
          </span>
        </span>
        <div>
          <a href="/update/{{ task.id }}" class="btn btn-warning btn-sm"
            >Edit</a
          >
          <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm"
            >Delete</a
          >
        </div>
      </div>

      {% endfor %}

      

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
